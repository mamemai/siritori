<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロックしりとり オンライン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #f0f4ff;
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .history-item::before { content: "→"; margin: 0 0.5rem; color: #6366f1; opacity: 0.5; }
        .history-item:first-child::before { content: ""; margin: 0; }
        #history-box { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        /* スコアのスクロールバーを隠す */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-3">
    <div id="app" class="max-w-md mx-auto w-full h-full flex flex-col">
        
        <!-- 1. ログイン画面 -->
        <div id="screen-login" class="flex-1 flex flex-col justify-center space-y-6">
            <h1 class="text-4xl font-black text-indigo-600 text-center tracking-tighter">ブロックしりとり</h1>
            <div class="glass p-6 rounded-[2rem] shadow-xl space-y-4">
                <input id="name-input" type="text" class="w-full p-4 rounded-xl border-none bg-indigo-50 outline-none text-lg font-bold text-center" placeholder="名前を入力">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black text-lg active:scale-95 transition">参加する</button>
            </div>
        </div>

        <!-- 2. ロビー画面（ホスト設定復活） -->
        <div id="screen-lobby" class="hidden flex-1 flex flex-col justify-center space-y-4 overflow-y-auto pb-10">
            <div class="glass p-5 rounded-3xl shadow-lg space-y-4">
                <div class="text-center">
                    <h2 class="font-black text-indigo-900 text-sm mb-1 uppercase tracking-widest">待機ロビー</h2>
                    <input id="invite-url" readonly onclick="copyUrl()" class="w-full bg-indigo-50 p-2 rounded text-[10px] text-indigo-600 text-center outline-none cursor-pointer">
                </div>
                
                <div id="player-list" class="flex flex-wrap gap-2 justify-center py-1"></div>

                <!-- ホスト専用：全設定項目 -->
                <div id="host-settings" class="hidden border-t border-indigo-100 pt-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">モード</p>
                            <select id="m-select" class="w-full p-2 rounded bg-indigo-50 font-bold text-xs outline-none">
                                <option value="point">ポイント制</option>
                                <option value="turn">ターン制</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">目標値</p>
                            <input id="v-input" type="number" value="15" class="w-full p-2 rounded bg-indigo-50 font-bold text-xs text-center outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-y-2 text-[10px] font-bold text-slate-500">
                        <label class="flex items-center gap-2"><input type="checkbox" id="c-n" class="w-4 h-4 rounded"> 「ん」継続OK</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="c-s" checked class="w-4 h-4 rounded"> 小文字無視</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="c-d" checked class="w-4 h-4 rounded"> 濁点無視</label>
                        <div class="col-span-2 space-y-1 mt-1">
                            <p class="text-slate-400">スタートワード</p>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-1"><input type="radio" name="sw" value="shiritori" checked> しりとり</label>
                                <label class="flex items-center gap-1"><input type="radio" name="sw" value="random"> ランダム</label>
                            </div>
                        </div>
                    </div>

                    <button onclick="requestStart()" class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition">
                        ゲームを開始する！
                    </button>
                </div>

                <!-- ゲスト用メッセージ -->
                <div id="guest-msg" class="hidden text-center py-6 text-indigo-400 font-black animate-pulse text-xs">ホストが準備中...</div>
            </div>
        </div>

        <!-- 3. ゲーム画面 -->
        <div id="screen-game" class="hidden flex-1 flex flex-col min-h-0">
            <!-- スコア -->
            <div id="score-top" class="flex gap-2 overflow-x-auto py-1 shrink-0 no-scrollbar"></div>
            
            <!-- メインワード -->
            <div class="bg-slate-900 py-5 px-3 rounded-2xl shadow-xl text-center shrink-0 mb-2 border-b-4 border-slate-800">
                <div id="current-word" class="text-3xl font-black text-white tracking-widest break-all"></div>
                <p class="text-indigo-500 text-[8px] font-bold mt-1 uppercase tracking-widest text-center">Current Word</p>
            </div>

            <!-- 履歴ボックス -->
            <div class="flex-1 glass rounded-2xl p-4 mb-2 min-h-0 flex flex-col shadow-inner">
                <div id="history-box" class="flex-1 font-bold text-slate-600 text-sm leading-relaxed"></div>
            </div>

            <!-- 入力エリア（ボタン埋め込み型） -->
            <div class="shrink-0 safe-pb">
                <div id="turn-info" class="text-center font-black text-indigo-600 text-[10px] mb-1 uppercase"></div>
                <div class="relative flex items-center">
                    <input id="word-input" type="text" 
                        class="w-full p-4 pr-20 rounded-2xl glass shadow-lg font-bold text-lg outline-none border-2 border-indigo-100 focus:border-indigo-400 transition" 
                        placeholder="つなげる..." 
                        autocomplete="off">
                    <button onclick="sendWord()" 
                        class="absolute right-2 bg-indigo-600 text-white px-5 py-2 rounded-xl font-black text-sm shadow-md active:scale-90 transition">
                        GO
                    </button>
                </div>
            </div>
        </div>

        <!-- 4. 勝利画面 -->
        <div id="screen-win" class="hidden fixed inset-0 bg-indigo-600 z-50 flex flex-col items-center justify-center p-6 text-center text-white">
            <div id="winner-name" class="text-5xl font-black text-yellow-400 mb-10 drop-shadow-lg"></div>
            <button onclick="location.reload()" class="bg-white text-indigo-600 px-12 py-4 rounded-full font-black text-lg shadow-2xl">タイトルへ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let roomId = new URLSearchParams(window.location.search).get('room');
        let isHost = false;

        function handleLogin() {
            const name = document.getElementById('name-input').value;
            if(!name) return;
            if (!roomId) {
                roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
                window.history.pushState({}, '', window.location.origin + window.location.pathname + '?room=' + roomId);
            }
            document.getElementById('invite-url').value = window.location.href;
            socket.emit('joinRoom', { roomId, name });
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
        }

        function copyUrl() {
            const urlInput = document.getElementById("invite-url");
            urlInput.select();
            document.execCommand("copy");
            alert("コピーしました");
        }

        function requestStart() {
            const swType = document.querySelector('input[name="sw"]:checked')?.value || 'shiritori';
            socket.emit('startGame', {
                roomId: roomId,
                settings: {
                    mode: document.getElementById('m-select').value,
                    targetValue: parseInt(document.getElementById('v-input').value) || 15,
                    allowN: document.getElementById('c-n').checked,
                    smallToBig: document.getElementById('c-s').checked,
                    ignoreDakuten: document.getElementById('c-d').checked,
                    startWordType: swType
                }
            });
        }

        function sendWord() {
            const input = document.getElementById('word-input');
            const word = input.value.trim();
            if(word) {
                socket.emit('submitWord', { roomId, word });
                input.value = "";
            }
        }

        document.getElementById('word-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendWord();
            }
        });

        socket.on('assignedRole', (data) => {
            isHost = data.isHost;
            if (isHost) document.getElementById('host-settings').classList.remove('hidden');
            else document.getElementById('guest-msg').classList.remove('hidden');
        });

        socket.on('updatePlayers', (players) => {
            document.getElementById('player-list').innerHTML = players.map(p => 
                `<span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">${p.isHost ? '👑 ' : ''}${p.name}</span>`
            ).join('');
        });

        socket.on('gameStarted', (state) => {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            render(state);
        });

        socket.on('updateState', render);

        socket.on('gameOver', (data) => {
            render(data.state);
            document.getElementById('screen-win').classList.remove('hidden');
            document.getElementById('winner-name').innerText = data.winner + "の勝利！";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        socket.on('errorMsg', (msg) => alert(msg));

        function render(state) {
            document.getElementById('current-word').innerText = state.lastWord;
            const turnIndex = state.turnIndex;
            document.getElementById('turn-info').innerText = state.players[turnIndex].id === socket.id ? "あなたの番！" : `${state.players[turnIndex].name}さんの番`;
            
            document.getElementById('score-top').innerHTML = state.players.map((p, i) => `
                <div class="shrink-0 px-5 py-2 rounded-xl glass ${i === turnIndex ? 'ring-2 ring-indigo-500 shadow-md' : 'opacity-40'}">
                    <div class="text-[8px] font-bold text-slate-400">${p.name}</div>
                    <div class="text-sm font-black">${p.score}</div>
                </div>
            `).join('');
            
            const historyBox = document.getElementById('history-box');
            historyBox.innerHTML = state.history.map(h => `<span class="history-item">${h}</span>`).join('');
            historyBox.scrollTop = historyBox.scrollHeight;
        }
    </script>
</body>
</html>
