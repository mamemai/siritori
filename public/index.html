<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロックしりとり オンライン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #f0f4ff;
            /* スマホの高さ一杯に固定（アドレスバーを考慮） */
            height: 100dvh; 
            margin: 0;
            overflow: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .history-item::before { content: "→"; margin: 0 0.5rem; color: #6366f1; opacity: 0.5; }
        .history-item:first-child::before { content: ""; margin: 0; }
        /* スムーズなスクロール */
        #history-box { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="p-3">
    <div id="app" class="max-w-md mx-auto h-full flex flex-col">
        
        <!-- STEP 1: 名前入力 (ここは従来通り) -->
        <div id="screen-login" class="flex-1 flex flex-col justify-center space-y-8">
            <div class="text-center">
                <h1 class="text-5xl font-black text-indigo-600 tracking-tighter">ブロック<br>しりとり</h1>
            </div>
            <div class="glass p-6 rounded-[2rem] shadow-xl space-y-4">
                <input id="name-input" type="text" class="w-full p-4 rounded-2xl border-none ring-4 ring-indigo-50 focus:ring-indigo-400 outline-none text-xl font-bold text-center" placeholder="名前を入力">
                <button id="btn-action" onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95">部屋を作る</button>
            </div>
        </div>

        <!-- STEP 2: ロビー画面 (コンパクト化) -->
        <div id="screen-lobby" class="hidden flex-1 flex flex-col justify-center space-y-4 overflow-y-auto">
            <div class="glass p-5 rounded-3xl shadow-lg space-y-4">
                <h2 class="text-center font-black text-indigo-900 tracking-widest uppercase">待機中</h2>
                <div class="bg-indigo-50 p-3 rounded-xl">
                    <p class="text-[10px] font-black text-indigo-400 mb-1">招待URL (タップでコピー)</p>
                    <input id="invite-url" readonly onclick="copyUrl()" class="w-full bg-transparent font-bold text-xs text-indigo-600 outline-none cursor-pointer overflow-hidden text-ellipsis">
                </div>
                <div id="player-list" class="flex flex-wrap gap-2 justify-center"></div>

                <div id="host-settings" class="hidden space-y-3 pt-3 border-t-2 border-dashed border-indigo-100">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="m-select" class="p-2 rounded-xl bg-indigo-50 font-bold text-xs outline-none">
                            <option value="point">ポイント制</option>
                            <option value="turn">ターン制</option>
                        </select>
                        <input id="v-input" type="number" value="15" class="p-2 rounded-xl bg-indigo-50 font-bold text-xs outline-none">
                    </div>
                    <div class="grid grid-cols-3 gap-1 text-[9px] font-black text-slate-500">
                        <label class="flex items-center gap-1"><input type="checkbox" id="c-n"> んOK</label>
                        <label class="flex items-center gap-1"><input type="checkbox" id="c-s" checked> 小無視</label>
                        <label class="flex items-center gap-1"><input type="checkbox" id="c-d" checked> 濁無視</label>
                    </div>
                    <button onclick="requestStart()" class="w-full bg-emerald-500 text-white p-4 rounded-xl font-black text-lg active:scale-95 transition">ゲーム開始！</button>
                </div>
                <div id="guest-msg" class="hidden text-center py-4 text-indigo-400 font-black animate-pulse">ホストが準備中です...</div>
            </div>
        </div>

        <!-- STEP 3: ゲーム画面 (スマホ最適化レイアウト) -->
        <div id="screen-game" class="hidden flex-1 flex flex-col h-full overflow-hidden">
            <!-- スコア (上部固定) -->
            <div id="score-top" class="flex gap-2 overflow-x-auto py-2 shrink-0 no-scrollbar"></div>
            
            <!-- メインワード (中央) -->
            <div class="bg-slate-900 py-6 px-4 rounded-[2rem] shadow-2xl text-center border-b-4 border-slate-800 shrink-0 mb-2">
                <div id="current-word" class="text-3xl font-black text-white tracking-widest break-all mb-1"></div>
                <p class="text-indigo-500 text-[10px] font-black uppercase tracking-widest italic">Current Block</p>
            </div>

            <div id="turn-info" class="text-center font-black text-indigo-600 text-[10px] uppercase mb-2 shrink-0"></div>

            <!-- 履歴 (ここが伸び縮みして、余白を埋める) -->
            <div class="flex-1 glass rounded-2xl p-4 mb-3 overflow-hidden flex flex-col min-h-0">
                <p class="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-widest">履歴</p>
                <div id="history-box" class="flex-1 overflow-y-auto font-bold text-slate-600 text-xs leading-relaxed"></div>
            </div>

            <!-- 入力欄とGOボタン (一番下に固定) -->
            <div class="flex gap-2 shrink-0 pb-2">
                <input id="word-input" type="text" class="flex-1 p-4 rounded-2xl glass font-bold text-lg outline-none focus:ring-4 ring-indigo-200 transition" placeholder="つなげる単語">
                <button onclick="sendWord()" class="bg-indigo-600 text-white px-8 rounded-2xl font-black text-xl active:scale-90 transition">GO</button>
            </div>
        </div>

        <!-- STEP 4: 勝利画面 -->
        <div id="screen-win" class="hidden fixed inset-0 bg-indigo-600 z-50 flex flex-col items-center justify-center p-6 text-center">
            <div id="winner-name" class="text-5xl font-black text-yellow-400 mb-10"></div>
            <button onclick="location.reload()" class="bg-white text-indigo-600 px-10 py-4 rounded-full font-black">タイトルへ</button>
        </div>
    </div>

    <script>
        /* JSの中身は変更なしですが、一応フルで載せます */
        const socket = io();
        let roomId = new URLSearchParams(window.location.search).get('room');
        let isHost = false;

        if (roomId) document.getElementById('btn-action').innerText = "参加する";

        function handleLogin() {
            const name = document.getElementById('name-input').value;
            if(!name) return alert("名前をいれてね");
            if (!roomId) {
                roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
                const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                window.history.pushState({}, '', newUrl);
                document.getElementById('invite-url').value = newUrl;
            } else {
                document.getElementById('invite-url').value = window.location.href;
            }
            socket.emit('joinRoom', { roomId, name });
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
        }

        function copyUrl() {
            const urlInput = document.getElementById("invite-url");
            urlInput.select();
            document.execCommand("copy");
            alert("URLをコピーしました");
        }

        function requestStart() {
            socket.emit('startGame', {
                roomId,
                settings: {
                    mode: document.getElementById('m-select').value,
                    targetValue: document.getElementById('v-input').value,
                    allowN: document.getElementById('c-n').checked,
                    smallToBig: document.getElementById('c-s').checked,
                    ignoreDakuten: document.getElementById('c-d').checked,
                    startWordType: document.querySelector('input[name="sw"]:checked')?.value || 'shiritori'
                }
            });
        }

        function sendWord() {
            const input = document.getElementById('word-input');
            if(input.value) {
                socket.emit('submitWord', { roomId, word: input.value });
                input.value = "";
            }
        }

        socket.on('assignedRole', (data) => {
            isHost = data.isHost;
            if (isHost) document.getElementById('host-settings').classList.remove('hidden');
            else document.getElementById('guest-msg').classList.remove('hidden');
        });

        socket.on('updatePlayers', (players) => {
            document.getElementById('player-list').innerHTML = players.map(p => 
                `<span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">${p.isHost ? '👑 ' : ''}${p.name}</span>`
            ).join('');
        });

        socket.on('gameStarted', (state) => {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            render(state);
        });

        socket.on('updateState', render);

        socket.on('gameOver', (data) => {
            render(data.state);
            document.getElementById('screen-win').classList.remove('hidden');
            document.getElementById('winner-name').innerText = data.winner + "の勝利！";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        socket.on('errorMsg', (msg) => alert(msg));

        function render(state) {
            const turnIndex = state.turnIndex;
            document.getElementById('current-word').innerText = state.lastWord;
            document.getElementById('turn-info').innerText = state.players[turnIndex].id === socket.id ? "あなたの番！" : `${state.players[turnIndex].name}さんの番`;
            document.getElementById('score-top').innerHTML = state.players.map((p, i) => `
                <div class="shrink-0 px-4 py-2 rounded-xl glass ${i === turnIndex ? 'ring-2 ring-indigo-500 shadow-md' : 'opacity-40'}">
                    <div class="text-[8px] font-black text-slate-400 uppercase">${p.name}</div>
                    <div class="text-sm font-black">${p.score}</div>
                </div>
            `).join('');
            
            const historyBox = document.getElementById('history-box');
            historyBox.innerHTML = state.history.map(h => `<span class="history-item">${h}</span>`).join('');
            // 履歴を常に一番下にスクロール
            historyBox.scrollTop = historyBox.scrollHeight;
        }
    </script>
</body>
</html>
