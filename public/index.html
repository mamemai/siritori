<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロックしりとり Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Noto+Sans+JP:wght@700;900&display=swap');
        body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; background: #f0f4ff; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .history-item::before { content: "→"; margin: 0 0.5rem; color: #6366f1; opacity: 0.5; }
        .history-item:first-child::before { content: ""; margin: 0; }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto">
        
        <!-- STEP 1: 名前入力画面 -->
        <div id="screen-login" class="py-10 space-y-8">
            <div class="text-center">
                <h1 class="text-5xl font-black text-indigo-600 tracking-tighter">BLOCK<br>SHIRITORI</h1>
            </div>
            <div class="glass p-8 rounded-[2rem] shadow-xl space-y-6">
                <input id="name-input" type="text" class="w-full p-4 rounded-2xl border-none ring-4 ring-indigo-50 focus:ring-indigo-400 outline-none text-xl font-bold text-center" placeholder="なまえ">
                <button id="btn-action" onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-xl shadow-lg transition">部屋を作る</button>
            </div>
        </div>

        <!-- STEP 2: ロビー（設定・待機）画面 -->
        <div id="screen-lobby" class="hidden py-6 space-y-6">
            <div class="glass p-6 rounded-3xl shadow-lg border-2 border-white">
                <h2 class="text-center font-black text-indigo-900 mb-4 tracking-widest uppercase">Lobby</h2>
                
                <!-- 招待用リンク -->
                <div class="bg-indigo-50 p-4 rounded-2xl mb-6">
                    <p class="text-[10px] font-black text-indigo-400 mb-1 uppercase tracking-widest">招待URL (友達に送る)</p>
                    <input id="invite-url" readonly onclick="copyUrl()" class="w-full bg-transparent font-bold text-xs text-indigo-600 outline-none cursor-pointer overflow-hidden text-ellipsis">
                </div>

                <!-- 参加者リスト -->
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">参加プレイヤー</p>
                <div id="player-list" class="flex flex-wrap gap-2 mb-6"></div>

                <!-- ホスト専用設定 -->
                <div id="host-settings" class="hidden space-y-4 pt-4 border-t-2 border-dashed border-indigo-100">
                    <h3 class="font-black text-slate-800 text-sm italic">RULE SETTINGS</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">モード</p>
                            <select id="m-select" class="w-full p-3 rounded-xl bg-indigo-50 font-bold text-sm outline-none">
                                <option value="point">ポイント制</option>
                                <option value="turn">ターン制</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <p id="target-label" class="text-[10px] font-bold text-slate-400 uppercase">目標値</p>
                            <input id="v-input" type="number" value="15" class="w-full p-3 rounded-xl bg-indigo-50 font-bold text-sm outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 text-[10px] font-black text-slate-500">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="c-n" class="w-4 h-4 rounded"> 「ん」継続</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="c-s" checked class="w-4 h-4 rounded"> 小文字無視</label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="c-d" checked class="w-4 h-4 rounded"> 濁点無視</label>
                        <div class="flex flex-col gap-1 col-span-2 mt-2">
                            <p class="text-slate-400">スタートワード</p>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="sw" value="shiritori" checked> しりとり</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="sw" value="random"> ランダム</label>
                            </div>
                        </div>
                    </div>
                    <button onclick="requestStart()" class="w-full bg-emerald-500 text-white p-5 rounded-2xl font-black text-xl shadow-xl hover:bg-emerald-600 transition transform hover:scale-[1.02]">
                        ゲームを開始する！
                    </button>
                </div>

                <!-- ゲスト用待機メッセージ -->
                <div id="guest-msg" class="hidden text-center py-6">
                    <p class="text-indigo-400 font-black animate-pulse">ホストが設定を選んでいます...</p>
                    <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-widest italic">Wait for host to start</p>
                </div>
            </div>
        </div>

        <!-- STEP 3: ゲームメイン画面 -->
        <div id="screen-game" class="hidden py-4 space-y-4">
            <div id="score-top" class="flex gap-2 overflow-x-auto pb-2 px-1"></div>
            <div class="bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl text-center border-b-8 border-slate-800">
                <div id="current-word" class="text-4xl md:text-5xl font-black text-white tracking-widest break-all"></div>
                <p class="text-indigo-500 text-[10px] font-black mt-2 uppercase tracking-[0.3em]">Current Word</p>
            </div>
            <div id="turn-info" class="text-center font-black text-indigo-600 text-xs uppercase tracking-widest py-1"></div>
            <div class="flex gap-2">
                <input id="word-input" type="text" class="flex-1 p-5 rounded-2xl glass font-bold text-xl outline-none focus:ring-4 ring-indigo-200 transition" placeholder="入力...">
                <button onclick="sendWord()" class="bg-indigo-600 text-white px-8 rounded-2xl font-black active:scale-95 transition">GO</button>
            </div>
            <div class="glass rounded-[2rem] p-6 h-48 flex flex-col shadow-inner">
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">History</p>
                <div id="history-box" class="flex-1 overflow-y-auto font-bold text-slate-600 leading-loose"></div>
            </div>
        </div>

        <!-- STEP 4: 勝利画面 -->
        <div id="screen-win" class="hidden fixed inset-0 bg-indigo-600 z-50 flex flex-col items-center justify-center p-6 text-center">
            <p class="text-indigo-200 font-black tracking-[0.5em] mb-4 uppercase">Winner!</p>
            <div id="winner-name" class="text-6xl font-black text-yellow-400 mb-10 drop-shadow-2xl"></div>
            <button onclick="location.reload()" class="bg-white text-indigo-600 px-12 py-5 rounded-full font-black text-xl shadow-2xl">タイトルへ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let roomId = new URLSearchParams(window.location.search).get('room');
        let isHost = false;

        // 初期URL確認
        if (roomId) {
            document.getElementById('btn-action').innerText = "この部屋に参加";
        }

        function handleLogin() {
            const name = document.getElementById('name-input').value;
            if(!name) return alert("名前を入力してね");
            
            if (!roomId) {
                // ホストとして部屋作成
                roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
                const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                window.history.pushState({}, '', newUrl);
                document.getElementById('invite-url').value = newUrl;
            } else {
                // ゲストとして参加
                document.getElementById('invite-url').value = window.location.href;
            }

            socket.emit('joinRoom', { roomId, name });
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
        }

        function copyUrl() {
            const urlInput = document.getElementById("invite-url");
            urlInput.select();
            document.execCommand("copy");
            alert("URLをコピーしたよ！友達に送ってね。");
        }

        function requestStart() {
            socket.emit('startGame', {
                roomId,
                settings: {
                    mode: document.getElementById('m-select').value,
                    targetValue: document.getElementById('v-input').value,
                    allowN: document.getElementById('c-n').checked,
                    smallToBig: document.getElementById('c-s').checked,
                    ignoreDakuten: document.getElementById('c-d').checked,
                    startWordType: document.querySelector('input[name="sw"]:checked').value
                }
            });
        }

        function sendWord() {
            const input = document.getElementById('word-input');
            if(input.value) {
                socket.emit('submitWord', { roomId, word: input.value });
                input.value = "";
            }
        }

        socket.on('assignedRole', (data) => {
            isHost = data.isHost;
            if (isHost) {
                document.getElementById('host-settings').classList.remove('hidden');
            } else {
                document.getElementById('guest-msg').classList.remove('hidden');
            }
        });

        socket.on('updatePlayers', (players) => {
            document.getElementById('player-list').innerHTML = players.map(p => 
                `<span class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md border border-white/20">${p.isHost ? '👑 ' : ''}${p.name}</span>`
            ).join('');
        });

        socket.on('gameStarted', (state) => {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            render(state);
        });

        socket.on('updateState', render);

        socket.on('gameOver', (data) => {
            render(data.state);
            document.getElementById('screen-win').classList.remove('hidden');
            document.getElementById('winner-name').innerText = data.winner + "の勝利！";
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        });

        socket.on('errorMsg', (msg) => alert(msg));

        function render(state) {
            const turnIndex = state.turnIndex;
            document.getElementById('current-word').innerText = state.lastWord;
            document.getElementById('turn-info').innerText = state.players[turnIndex].id === socket.id ? "あなたの番です！" : `${state.players[turnIndex].name}さんが入力中...`;
            document.getElementById('score-top').innerHTML = state.players.map((p, i) => `
                <div class="flex-shrink-0 px-6 py-3 rounded-2xl glass transition-all ${i === turnIndex ? 'ring-4 ring-indigo-500 shadow-xl scale-105' : 'opacity-40'}">
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${p.name}</div>
                    <div class="text-2xl font-black">${p.score}</div>
                </div>
            `).join('');
            document.getElementById('history-box').innerHTML = state.history.map(h => `<span class="history-item">${h}</span>`).join('');
        }
    </script>
</body>
</html>
