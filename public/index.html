<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロックしりとり オンライン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #f0f4ff;
            height: 100dvh;
            margin: 0;
            overflow: hidden; /* 全体のスクロールを禁止 */
        }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .history-item::before { content: "→"; margin: 0 0.5rem; color: #6366f1; opacity: 0.5; }
        .history-item:first-child::before { content: ""; margin: 0; }
        
        #history-box { 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-2">
    <div id="app" class="max-w-md mx-auto h-full flex flex-col">
        
        <!-- 1. ログイン画面 -->
        <div id="screen-login" class="flex-1 flex flex-col justify-center space-y-6">
            <div class="text-center">
                <h1 class="text-4xl font-black text-indigo-600 tracking-tighter">ブロックしりとり</h1>
            </div>
            <div class="glass p-6 rounded-[2rem] shadow-xl space-y-4">
                <input id="name-input" type="text" class="w-full p-4 rounded-xl border-none ring-2 ring-indigo-50 focus:ring-indigo-400 outline-none text-lg font-bold text-center" placeholder="名前を入力">
                <button id="btn-action" onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black text-lg active:scale-95 transition">参加する</button>
            </div>
        </div>

        <!-- 2. ロビー画面 -->
        <div id="screen-lobby" class="hidden flex-1 flex flex-col justify-center space-y-4">
            <div class="glass p-5 rounded-3xl shadow-lg space-y-3">
                <h2 class="text-center font-black text-indigo-900 text-sm">待機中</h2>
                <div class="bg-indigo-50 p-3 rounded-xl">
                    <p class="text-[9px] font-black text-indigo-400 mb-1 uppercase">招待URL (タップでコピー)</p>
                    <input id="invite-url" readonly onclick="copyUrl()" class="w-full bg-transparent font-bold text-[10px] text-indigo-600 outline-none cursor-pointer">
                </div>
                <div id="player-list" class="flex flex-wrap gap-2 justify-center"></div>

                <div id="host-settings" class="hidden space-y-3 pt-3 border-t border-indigo-100">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="m-select" class="p-2 rounded-lg bg-indigo-50 font-bold text-xs outline-none">
                            <option value="point">ポイント制</option>
                            <option value="turn">ターン制</option>
                        </select>
                        <input id="v-input" type="number" value="15" class="p-2 rounded-lg bg-indigo-50 font-bold text-xs outline-none">
                    </div>
                    <div class="flex gap-4 justify-center text-[10px] font-bold text-slate-500">
                        <label class="flex items-center gap-1"><input type="checkbox" id="c-n"> んOK</label>
                    </div>
                    <button onclick="requestStart()" class="w-full bg-emerald-500 text-white p-3 rounded-xl font-black text-md active:scale-95 transition">ゲーム開始！</button>
                </div>
                <div id="guest-msg" class="hidden text-center py-2 text-indigo-400 font-black animate-pulse text-xs">ホストが準備中...</div>
            </div>
        </div>

        <!-- 3. ゲーム画面 -->
        <div id="screen-game" class="hidden flex-1 flex flex-col min-h-0">
            <!-- スコア -->
            <div id="score-top" class="flex gap-2 overflow-x-auto py-1 shrink-0 no-scrollbar"></div>
            
            <!-- メインワード -->
            <div class="bg-slate-900 py-4 px-3 rounded-2xl shadow-xl text-center shrink-0 mb-2">
                <div id="current-word" class="text-2xl font-black text-white tracking-widest break-all mb-1"></div>
                <p class="text-indigo-500 text-[8px] font-black uppercase">Current Word</p>
            </div>

            <!-- 履歴ボックス (ここが伸縮する) -->
            <div class="flex-1 glass rounded-2xl p-3 mb-2 min-h-0 flex flex-col shadow-inner">
                <div id="history-box" class="flex-1 font-bold text-slate-600 text-xs leading-relaxed"></div>
            </div>

            <!-- 入力欄とGOボタン (絶対に下に固定) -->
            <div class="shrink-0 pb-4 pt-1">
                <div id="turn-info" class="text-center font-black text-indigo-600 text-[10px] mb-1 uppercase"></div>
                <div class="flex gap-2">
                    <input id="word-input" type="text" class="flex-1 p-4 rounded-xl glass shadow-md font-bold text-lg outline-none border-2 border-transparent focus:border-indigo-400" placeholder="つなげる..." enterkeyhint="go">
                    <button onclick="sendWord()" class="bg-indigo-600 text-white px-6 rounded-xl font-black text-lg shadow-lg active:scale-90 transition">GO</button>
                </div>
            </div>
        </div>

        <!-- 勝利画面 -->
        <div id="screen-win" class="hidden fixed inset-0 bg-indigo-600 z-50 flex flex-col items-center justify-center p-6 text-center text-white">
            <div id="winner-name" class="text-4xl font-black mb-8 italic"></div>
            <button onclick="location.reload()" class="bg-white text-indigo-600 px-10 py-4 rounded-full font-black">タイトルへ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let roomId = new URLSearchParams(window.location.search).get('room');
        let isHost = false;

        if (roomId) document.getElementById('btn-action').innerText = "参加する";

        function handleLogin() {
            const name = document.getElementById('name-input').value;
            if(!name) return;
            if (!roomId) {
                roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
                const newUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
                window.history.pushState({}, '', newUrl);
                document.getElementById('invite-url').value = newUrl;
            } else {
                document.getElementById('invite-url').value = window.location.href;
            }
            socket.emit('joinRoom', { roomId, name });
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
        }

        function copyUrl() {
            const urlInput = document.getElementById("invite-url");
            urlInput.select();
            document.execCommand("copy");
            alert("コピーしました");
        }

        function requestStart() {
            // エラー防止のため、要素があるか確認しながら取得
            const mSelect = document.getElementById('m-select');
            const vInput = document.getElementById('v-input');
            const cN = document.getElementById('c-n');

            socket.emit('startGame', {
                roomId: roomId,
                settings: {
                    mode: mSelect ? mSelect.value : 'point',
                    targetValue: vInput ? parseInt(vInput.value) : 15,
                    allowN: cN ? cN.checked : false,
                    smallToBig: true,
                    ignoreDakuten: true,
                    startWordType: 'shiritori'
                }
            });
        }

        function sendWord() {
            const input = document.getElementById('word-input');
            if(input.value) {
                socket.emit('submitWord', { roomId, word: input.value });
                input.value = "";
            }
        }

        document.getElementById('word-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendWord();
        });

        socket.on('assignedRole', (data) => {
            isHost = data.isHost;
            if (isHost) document.getElementById('host-settings')?.classList.remove('hidden');
            else document.getElementById('guest-msg')?.classList.remove('hidden');
        });

        socket.on('updatePlayers', (players) => {
            const list = document.getElementById('player-list');
            if (list) {
                list.innerHTML = players.map(p => 
                    `<span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">${p.isHost ? '👑 ' : ''}${p.name}</span>`
                ).join('');
            }
        });

        socket.on('gameStarted', (state) => {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            render(state);
        });

        socket.on('updateState', render);

        socket.on('gameOver', (data) => {
            render(data.state);
            document.getElementById('screen-win').classList.remove('hidden');
            document.getElementById('winner-name').innerText = data.winner + "の勝利！";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        socket.on('errorMsg', (msg) => alert(msg));

        function render(state) {
            const turnIndex = state.turnIndex;
            const lastWordEl = document.getElementById('current-word');
            const turnInfoEl = document.getElementById('turn-info');
            const scoreEl = document.getElementById('score-top');
            const historyBox = document.getElementById('history-box');

            if (lastWordEl) lastWordEl.innerText = state.lastWord;
            if (turnInfoEl) turnInfoEl.innerText = state.players[turnIndex].id === socket.id ? "あなたの番！" : `${state.players[turnIndex].name}さんの番`;
            
            if (scoreEl) {
                scoreEl.innerHTML = state.players.map((p, i) => `
                    <div class="shrink-0 px-4 py-2 rounded-xl glass ${i === turnIndex ? 'ring-2 ring-indigo-500' : 'opacity-40'}">
                        <div class="text-[8px] font-bold text-slate-400">${p.name}</div>
                        <div class="text-xs font-black">${p.score}</div>
                    </div>
                `).join('');
            }
            
            if (historyBox) {
                historyBox.innerHTML = state.history.map(h => `<span class="history-item">${h}</span>`).join('');
                historyBox.scrollTop = historyBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
